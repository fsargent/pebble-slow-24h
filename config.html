<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width">
  <style>
    body { font-family: -apple-system, sans-serif; margin: 20px; background: #f5f5f5; color: #111 }
    h2 { color: #111 }
    .card { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.12) }
    .row { display: flex; justify-content: space-between; align-items: center }
    label { font-size: 16px; color: #111 }
    input[type="checkbox"] { width: 22px; height: 22px }
    button { width: 100%; padding: 14px; background: #007aff; color: #fff; border: none; border-radius: 8px; font-size: 16px; margin-top: 16px; cursor: pointer }
    #result { margin-top: 16px; padding: 12px; background: #e8f5e9; border-radius: 8px; display: none; font-family: monospace; font-size: 14px; color: #111 }
  </style>
</head>
<body>
  <h2>slow-24h Settings</h2>
  <div class="card"><div class="row">
    <label>12-hour numerals</label>
    <input type="checkbox" id="use12h">
  </div></div>
  <div class="card"><div class="row">
    <label>Show rain overlay</label>
    <input type="checkbox" id="showRain" checked>
  </div></div>
  <button onclick="submit()">Save</button>
  <div id="result"></div>
  <script>
    var opts = {};
    try { opts = JSON.parse(decodeURIComponent(location.hash.substring(1))); } catch(e) {}
    if (opts.use12h) document.getElementById('use12h').checked = true;
    if (opts.showRain === false) document.getElementById('showRain').checked = false;

    function submit() {
      var r = {
        use12h: document.getElementById('use12h').checked,
        showRain: document.getElementById('showRain').checked
      };
      if (window.location.protocol === 'data:') {
        document.location = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(r));
      } else {
        var el = document.getElementById('result');
        el.style.display = 'block';
        el.textContent = 'Would send: ' + JSON.stringify(r, null, 2);
      }
    }
  </script>
</body>
</html>
